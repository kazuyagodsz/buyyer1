		var customStyleCSS="";
		var enableJSCache=true;
		var cachedScript={};
		
		function loadJS(url){
			if(!initCacheComplete) return false;
			return requestJS(url);
		}

		function resizeIFrame() {
            var iFrameDOM = $("iframe").contents();
            // console.log(iFrameDOM.find("#wrap").height());
            // iFrameDOM.find("#wrap").height((($(window).height() * 94) / 100) - selisihHeight);

		}


        function requestJS(url){
			if(!enableJSCache) return false;
			var js = cachedScript[url];
			if(typeof js === 'undefined'){
				$.ajax({
				    url: url,
				    dataType: 'text',
				    success: function(data) {
				    	cachedScript[url] = data;
				    },
				    complete: function(jqXHR, textStatus){
				    	isInitBusy = false;
				    }
				});
				return false;
			}else{
				isInitBusy = false;
				return js;
			}
		}
		
		function loadCSS(url){
			if(!initCacheComplete) return false;
			return requestCSS(url);
		}
		
		function requestCSS(url, context, locationOrigin){
			if(!enableJSCache) return false;
			var css = cachedScript[url];
			if(typeof css === 'undefined'){
				$.ajax({
				    url: url,
				    dataType: 'text',
				    success: function(data) {
				    	cachedScript[url] = fixCSSUrl(data, context, locationOrigin, url);
				    },
				    complete: function(jqXHR, textStatus){
				    	isInitBusy = false;
				    }
				});
				return false;
			}else{
				isInitBusy = false;
				return css;
			}
		}
		
		function fixCSSUrl(css, context, locationOrigin, url){
			var pos = 0;
		    while(true){
		      pos = css.indexOf("url(", pos);
		      if(pos == -1) return(css);
		      pos += 5;
		      if(css.slice(pos-1, pos) == "'" || css.slice(pos-1, pos) == '"'){
		    	  css = [css.slice(0, pos), locationOrigin, context, url.substr(0, url.lastIndexOf("/")), "/", css.slice(pos)].join('');     
		   	  }else{
		    	  css = [css.slice(0, pos-1), locationOrigin, context, url.substr(0, url.lastIndexOf("/")), "/", css.slice(pos-1)].join('');
		      }
		    }
		}
		
		function initCSS(url){
			var context = "";
		    if(url.substr(0,3).indexOf("../") != -1){
		    	context = window.location.pathname.substr(0,window.location.pathname.lastIndexOf("/")) + "/"; 
		    }
		    var pathArray = location.href.split( '/' );
			var protocol = pathArray[0];
			var host = pathArray[2];
			var locationOrigin = protocol + '//' + host;
			loadCSS(url,context,locationOrigin);
		}
		
		var preloadCssList =[
								"/common2/css/jquery-ui.css",
								"/common2/css/opa-icons.css",
								"/common2/css/bootstrap.css",
								"/common/css/bootstrap-responsive.css",
								"/common/css/bootstrap-custom.css",
								"/common2/css/bootstrap.min.css",
								"/css/primecash.css",
								"/common2/css/primecash-themes.css",
								"/common/css/datatables/table.css",
								"/common/css/select2/select2.css",
								"/common/css/select2/select2-custom.css",
								"/css/plugins/icons/style2.css"
		             		];
		
		var preloadJsList = [
								"/common2/js/jquery-1.11.1.min.js",
								"/common2/js/jquery-ui.custom.min.js",
								"/common2/js/bootstrap.js",
								"/common2/js/global.js",
								"/common2/js/accounting.js",
								"/common2/js/globalbank02.js",
								"/common2/js/jquery.validate.js",
								"/common2/js/footer.js",
								"/common2/js/pdf/css-embedder.js",
								"/common2/js/pdf/leger-pdf.js",
								"/common2/js/select2/select2.min.js",
								"/common/js/datatables/jquery.dataTables.js",
								"/common/js/datatables/dataTablesExtend.js",
								"/common/js/datatables/jquery.dataTables.rowGrouping.js",
								"/common/js/datatables/jquery.dataTables.rowspan-custom.js"
							];

		var isInitBusy = false;
		var isInitPause = false;
		var initCounter = 0;
		var initTimer;
		var initCacheComplete = false;
        localStorage.setItem("initCacheComplete", 'false');
        localStorage.setItem("resourceSize",(preloadCssList.length + preloadJsList.length));
		function initCache(init){
			if(!init || typeof initTimer !== 'undefined') return;
			enableJSCache = init;
			initTimer = setInterval(function(){
				if(isInitBusy || isInitPause) return;
				if(initCounter >= preloadCssList.length + preloadJsList.length){
					clearInterval(initTimer);
					initCacheComplete = true;
                    localStorage.setItem("initCacheComplete", 'true');
					return;
				}
				
				isInitBusy = true;
				if(initCounter >=  preloadCssList.length){
					requestJS(preloadJsList[initCounter++ - preloadCssList.length]);
				}else{
					requestCSS(preloadCssList[initCounter++]);
				}
                localStorage.setItem("initDownload", initCounter);
			}, 1);
		}
		
		function pauseCacheInit(){
			isInitPause = true;
		}
		
		function resumeCacheInit(){
			isInitPause = false;
		}
		
		$(window).unload(function() {
    		$.ajax({ "dataType": 'json', "type": "GET", "cache": false, async: false, "url": '/loginfo/logoutURL' });
		});
